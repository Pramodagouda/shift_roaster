<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftRoaster - Employee Schedule Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.6);
            --surface-hover: rgba(51, 65, 85, 0.6);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Header */
        .app-header {
            padding: 40px 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .app-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -10%;
            width: 120%;
            height: 200%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.05));
            filter: blur(80px);
            z-index: 0;
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        .app-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .app-header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 1.1rem;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }

        /* Glass Cards */
        .panel {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.1),
                0 2px 4px -1px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            box-shadow: 
                0 20px 25px -5px rgba(0, 0, 0, 0.2),
                0 10px 10px -5px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .panel-title .icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: rgba(148, 163, 184, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        /* Inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group select {
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        /* Shift Form */
        .shift-form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        /* Employee List */
        .employee-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .employee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .employee-item:hover {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateX(4px);
        }

        .employee-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .employee-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .employee-details h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .employee-details span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Roster Grid */
        .roster-grid {
            display: grid;
            grid-template-columns: 220px repeat(7, 1fr);
            gap: 2px;
            background: rgba(148, 163, 184, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .grid-header {
            background: rgba(15, 23, 42, 0.8);
            padding: 18px 10px;
            text-align: center;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .grid-header.day-header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.1));
            color: var(--text);
            border-bottom: 2px solid var(--primary);
        }

        .employee-cell {
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .shift-cell {
            background: rgba(15, 23, 42, 0.3);
            padding: 12px;
            min-height: 90px;
            position: relative;
            transition: all 0.3s ease;
        }

        .shift-cell:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .shift-cell.drag-over {
            background: rgba(99, 102, 241, 0.15);
            border: 2px dashed var(--primary-light);
            box-shadow: inset 0 0 20px rgba(99, 102, 241, 0.1);
        }

        /* Shift Blocks */
        .shift-block {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 8px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            user-select: none;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shift-block:active {
            cursor: grabbing;
        }

        .shift-block.dragging {
            opacity: 0.6;
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
        }

        .shift-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .shift-block.morning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .shift-block.morning:hover {
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.4);
        }

        .shift-block.afternoon {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .shift-block.afternoon:hover {
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.4);
        }

        .shift-block.night {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .shift-block.night:hover {
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .shift-time {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 4px;
            font-weight: 500;
        }

        .shift-delete {
            position: absolute;
            top: 4px;
            right: 6px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.8rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .shift-delete:hover {
            background: var(--danger);
            transform: scale(1.1);
        }

        .shift-block:hover .shift-delete {
            display: flex;
        }

        .empty-cell {
            color: rgba(148, 163, 184, 0.3);
            font-size: 0.9rem;
            text-align: center;
            padding-top: 24px;
            font-weight: 500;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
            border-radius: 24px;
            padding: 36px;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal-close {
            background: rgba(148, 163, 184, 0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            transform: rotate(90deg);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            z-index: 2000;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .toast.error {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
        }

        /* Templates */
        .template-list {
            display: grid;
            gap: 12px;
        }

        .template-item {
            padding: 20px 24px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .template-item:hover {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateX(6px);
        }

        .template-name {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .template-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }

        /* Print */
        .print-only { display: none; }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block; }
            body { background: white; color: #000; }
            .panel { background: white; border: 1px solid #ddd; box-shadow: none; }
            .roster-grid { border: 1px solid #ddd; }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .roster-grid { grid-template-columns: 160px repeat(7, 1fr); }
            .shift-form { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            .app-header { padding: 30px 20px 15px; }
        }

        @media (max-width: 600px) {
            .roster-grid {
                display: flex;
                flex-direction: column;
            }
            .grid-header, .employee-cell { display: none; }
            .shift-cell {
                border-bottom: 1px solid var(--border);
                min-height: auto;
            }
            .shift-cell::before {
                content: attr(data-day);
                font-weight: 700;
                color: var(--primary-light);
                display: block;
                margin-bottom: 10px;
                font-size: 0.9rem;
                text-transform: uppercase;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1>📅 ShiftRoaster</h1>
            <p>Create and manage employee shift schedules with ease</p>
        </div>
    </header>

    <div class="container">
        <!-- Employees -->
        <div class="panel no-print">
            <div class="panel-title">
                <div class="icon">👥</div>
                Employees
                <button class="btn btn-primary" onclick="openModal('employeeModal')" style="margin-left: auto; font-size: 0.85rem; padding: 10px 20px;">
                    + Add Employee
                </button>
            </div>
            <div id="employeeList" class="employee-list">
                <p style="color: var(--text-muted); text-align: center; padding: 30px;">No employees added yet. Add your first employee to get started.</p>
            </div>
        </div>

        <!-- Assign Shift -->
        <div class="panel no-print">
            <div class="panel-title">
                <div class="icon">⏰</div>
                Assign Shift
            </div>
            <form id="shiftForm" onsubmit="return addShift(event)">
                <div class="shift-form">
                    <div class="form-group">
                        <label>Employee</label>
                        <select id="shiftEmployee" required>
                            <option value="">Select employee...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Day</label>
                        <select id="shiftDay" required>
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                            <option value="5">Saturday</option>
                            <option value="6">Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start</label>
                        <input type="time" id="shiftStart" required value="09:00">
                    </div>
                    <div class="form-group">
                        <label>End</label>
                        <input type="time" id="shiftEnd" required value="17:00">
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="shiftType">
                            <option value="morning">Morning</option>
                            <option value="afternoon">Afternoon</option>
                            <option value="night">Night</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Assign</button>
                </div>
            </form>
        </div>

        <!-- Templates -->
        <div class="panel no-print">
            <div class="panel-title" style="justify-content: space-between;">
                <span><div class="icon" style="display: inline-flex; margin-right: 12px;">📋</div>Weekly Templates</span>
                <button class="btn btn-secondary" onclick="openModal('templateModal')" style="font-size: 0.85rem; padding: 10px 20px;">
                    Save as Template
                </button>
            </div>
            <div id="templateList" class="template-list">
                <p style="color: var(--text-muted); text-align: center; padding: 20px;">No templates saved yet.</p>
            </div>
        </div>

        <!-- Roster Grid -->
        <div class="panel">
            <div class="panel-title" style="justify-content: space-between;">
                <span><div class="icon" style="display: inline-flex; margin-right: 12px;">📊</div>Weekly Roster <small style="font-weight: 400; color: var(--text-muted); margin-left: 8px;">— drag shifts to move</small></span>
                <div class="no-print">
                    <button class="btn btn-secondary" onclick="clearAllShifts()">Clear</button>
                    <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
                    <button class="btn btn-primary" onclick="exportData()">📥 Export</button>
                </div>
            </div>
            <div class="roster-grid" id="rosterGrid"></div>
        </div>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal-overlay" id="employeeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add New Employee</h3>
                <button class="modal-close" onclick="closeModal('employeeModal')">×</button>
            </div>
            <form onsubmit="return addEmployee(event)">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Full Name *</label>
                        <input type="text" id="empName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="empRole" placeholder="Cashier, Manager...">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="empPhone" placeholder="+1 234 567 890">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Email</label>
                        <input type="email" id="empEmail" placeholder="john@company.com">
                    </div>
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('employeeModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Template Modal -->
    <div class="modal-overlay" id="templateModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Save as Template</h3>
                <button class="modal-close" onclick="closeModal('templateModal')">×</button>
            </div>
            <form onsubmit="return saveTemplate(event)">
                <div class="form-group" style="margin-bottom: 24px;">
                    <label>Template Name</label>
                    <input type="text" id="templateName" required placeholder="e.g., Standard Week">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('templateModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Template</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let employees = JSON.parse(localStorage.getItem('sr_employees')) || [];
        let shifts = JSON.parse(localStorage.getItem('sr_shifts')) || [];
        let templates = JSON.parse(localStorage.getItem('sr_templates')) || [];
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let draggedShift = null;

        document.addEventListener('DOMContentLoaded', () => renderAll());

        function saveData() {
            localStorage.setItem('sr_employees', JSON.stringify(employees));
            localStorage.setItem('sr_shifts', JSON.stringify(shifts));
            localStorage.setItem('sr_templates', JSON.stringify(templates));
        }

        function renderAll() {
            renderEmployeeList();
            renderEmployeeSelect();
            renderRosterGrid();
            renderTemplates();
        }

        function showToast(message, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function addEmployee(e) {
            e.preventDefault();
            const employee = {
                id: Date.now(),
                name: document.getElementById('empName').value,
                role: document.getElementById('empRole').value || '',
                phone: document.getElementById('empPhone').value || '',
                email: document.getElementById('empEmail').value || ''
            };
            
            employees.push(employee);
            saveData();
            renderAll();
            closeModal('employeeModal');
            e.target.reset();
            showToast('Employee added!');
            return false;
        }

        function removeEmployee(id) {
            if (confirm('Remove this employee and all their shifts?')) {
                employees = employees.filter(e => e.id !== id);
                shifts = shifts.filter(s => s.employeeId !== id);
                saveData();
                renderAll();
                showToast('Employee removed');
            }
        }

        function renderEmployeeList() {
            const container = document.getElementById('employeeList');
            if (employees.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 30px;">No employees added yet. Add your first employee to get started.</p>';
                return;
            }
            
            container.innerHTML = employees.map(emp => {
                const initials = emp.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const details = [emp.role, emp.phone, emp.email].filter(Boolean).join(' • ');
                return `
                    <div class="employee-item">
                        <div class="employee-info">
                            <div class="employee-avatar">${initials}</div>
                            <div class="employee-details">
                                <h4>${emp.name}</h4>
                                <span>${details || 'No additional info'}</span>
                            </div>
                        </div>
                        <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.8rem;" onclick="removeEmployee(${emp.id})">Remove</button>
                    </div>
                `;
            }).join('');
        }

        function renderEmployeeSelect() {
            const select = document.getElementById('shiftEmployee');
            select.innerHTML = '<option value="">Select employee...</option>' + 
                employees.map(e => <option value="${e.id}">${e.name}${e.role ? ' (' + e.role + ')' : ''}</option>).join('');
        }

        function addShift(e) {
            e.preventDefault();
            const employeeId = parseInt(document.getElementById('shiftEmployee').value);
            const day = parseInt(document.getElementById('shiftDay').value);
            const start = document.getElementById('shiftStart').value;
            const end = document.getElementById('shiftEnd').value;
            const type = document.getElementById('shiftType').value;

            if (!employeeId) {
                showToast('Please select an employee', true);
                return false;
            }

            const hasConflict = shifts.some(s => 
                s.employeeId === employeeId && 
                s.day === day && 
                ((start >= s.start && start < s.end) || (end > s.start && end <= s.end) || (start <= s.start && end >= s.end))
            );

            if (hasConflict) {
                showToast('Time conflict with existing shift!', true);
                return false;
            }

            shifts.push({
                id: Date.now(),
                employeeId,
                day,
                start,
                end,
                type
            });

            saveData();
            renderAll();
            showToast('Shift assigned!');
            return false;
        }

        function removeShift(id) {
            shifts = shifts.filter(s => s.id !== id);
            saveData();
            renderAll();
            showToast('Shift removed');
        }

        function calculateHours(start, end) {
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            let hours = (eh * 60 + em - sh * 60 - sm) / 60;
            if (hours < 0) hours += 24;
            return hours;
        }

        // Drag and Drop
        function handleDragStart(e, shiftId) {
            draggedShift = shifts.find(s => s.id === shiftId);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', shiftId);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedShift = null;
            document.querySelectorAll('.shift-cell').forEach(cell => cell.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const cell = e.target.closest('.shift-cell');
            if (cell) cell.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            const cell = e.target.closest('.shift-cell');
            if (cell) cell.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const cell = e.target.closest('.shift-cell');
            if (cell && draggedShift) {
                cell.classList.remove('drag-over');
                const newDay = parseInt(cell.dataset.day);
                const newEmployeeId = parseInt(cell.dataset.employee);

                if (isNaN(newDay) || isNaN(newEmployeeId)) return;

                const hasConflict = shifts.some(s => 
                    s.id !== draggedShift.id &&
                    s.employeeId === newEmployeeId && 
                    s.day === newDay && 
                    ((draggedShift.start >= s.start && draggedShift.start < s.end) || 
                     (draggedShift.end > s.start && draggedShift.end <= s.end))
                );

                if (hasConflict) {
                    showToast('Cannot move: time conflict!', true);
                    return;
                }

                draggedShift.day = newDay;
                draggedShift.employeeId = newEmployeeId;
                saveData();
                renderAll();
                showToast('Shift moved!');
            }
        }

        function renderRosterGrid() {
            const grid = document.getElementById('rosterGrid');
            
            let html = '<div class="grid-header">Employee</div>';
            days.forEach(day => {
                html += <div class="grid-header day-header">${day.substring(0, 3)}</div>;
            });

            if (employees.length === 0) {
                html += <div class="employee-cell" style="grid-column: 1 / -1; justify-content: center; color: var(--text-muted); padding: 40px;">No employees added</div>;
            } else {
                employees.forEach(emp => {
                    const initials = emp.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    html += `
                        <div class="employee-cell">
                            <div class="employee-avatar">${initials}</div>
                            <div>
                                <div style="font-weight: 700;">${emp.name}</div>
                                ${emp.role ? <small style="color: var(--text-muted); font-weight: 400;">${emp.role}</small> : ''}
                            </div>
                        </div>
                    `;

                    days.forEach((day, dayIndex) => {
                        const dayShifts = shifts.filter(s => s.employeeId === emp.id && s.day === dayIndex);
                        html += `<div class="shift-cell" 
                            data-day="${dayIndex}" 
                            data-employee="${emp.id}"
                            ondragover="handleDragOver(event)" 
                            ondragleave="handleDragLeave(event)" 
                            ondrop="handleDrop(event)">`;
                        
                        if (dayShifts.length === 0) {
                            html += '<div class="empty-cell">—</div>';
                        } else {
                            dayShifts.forEach(shift => {
                                const hours = calculateHours(shift.start, shift.end);
                                html += `
                                    <div class="shift-block ${shift.type}" 
                                        draggable="true"
                                        ondragstart="handleDragStart(event, ${shift.id})"
                                        ondragend="handleDragEnd(event)">
                                        ${shift.start} - ${shift.end}
                                        <div class="shift-time">${hours.toFixed(1)} hrs</div>
                                        <button class="shift-delete" onclick="event.stopPropagation(); removeShift(${shift.id})">×</button>
                                    </div>
                                `;
                            });
                        }
                        html += '</div>';
                    });
                });
            }

            grid.innerHTML = html;
        }

        function clearAllShifts() {
            if (confirm('Clear all shifts? Employees will be kept.')) {
                shifts = [];
                saveData();
                renderAll();
                showToast('All shifts cleared');
            }
        }

        // Templates
        function renderTemplates() {
            const container = document.getElementById('templateList');
            if (templates.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">No templates saved yet. Save your current schedule as a template for quick reuse.</p>';
                return;
            }

            container.innerHTML = templates.map((t, index) => `
                <div class="template-item" onclick="loadTemplate(${index})">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div class="template-name">${t.name}</div>
                            <div class="template-desc">${t.employees.length} employees • ${t.shifts.length} shifts • ${new Date(t.created).toLocaleDateString()}</div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.8rem;" onclick="event.stopPropagation(); loadTemplate(${index})">Load</button>
                            <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.8rem;" onclick="event.stopPropagation(); deleteTemplate(${index})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function saveTemplate(e) {
            e.preventDefault();
            templates.push({
                name: document.getElementById('templateName').value,
                employees: JSON.parse(JSON.stringify(employees)),
                shifts: JSON.parse(JSON.stringify(shifts)),
                created: new Date().toISOString()
            });
            saveData();
            renderTemplates();
            closeModal('templateModal');
            e.target.reset();
            showToast('Template saved!');
            return false;
        }

        function loadTemplate(index) {
            const t = templates[index];
            if (confirm(Load template "${t.name}"? This will replace current schedule.)) {
                employees = JSON.parse(JSON.stringify(t.employees));
                shifts = JSON.parse(JSON.stringify(t.shifts));
                saveData();
                renderAll();
                showToast(Template "${t.name}" loaded!);
            }
        }

        function deleteTemplate(index) {
            if (confirm('Delete this template?')) {
                templates.splice(index, 1);
                saveData();
                renderTemplates();
                showToast('Template deleted');
            }
        }

        function exportData() {
            const data = {
                exportDate: new Date().toISOString(),
                employees,
                shifts: shifts.map(s => ({
                    ...s,
                    employeeName: employees.find(e => e.id === s.employeeId)?.name,
                    dayName: days[s.day]
                }))
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = roster-${new Date().toISOString().split('T')[0]}.json;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported successfully!');
        }

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) overlay.classList.remove('active');
            });
        });
    </script>
</body>
</html>
